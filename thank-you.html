<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thank You – Bloom Bar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&display=swap');
  body { font-family:'Lato',sans-serif; background:#f7f1e8; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; text-align:center; padding:24px; }
  .card { max-width:480px; }
  h1 { font-family:'Playfair Display',serif; color:#5c3d2e; font-size:2.4rem; margin-bottom:16px; }
  h1 em { color:#7a8c6e; font-style:italic; }
  p { color:#6b5a52; font-size:1.05rem; line-height:1.85; margin-bottom:28px; }
  a { display:inline-block; padding:14px 36px; background:#c27a5a; color:#fff; border-radius:40px; text-decoration:none; font-weight:700; transition:background .2s; }
  a:hover { background:#5c3d2e; }
</style>
</head>
<body>
  <div class="card">
    <div style="font-size:3.5rem;margin-bottom:20px;">🌸</div>
    <h1>Thank You for<br><em>Reaching Out!</em></h1>
    <p>We've received your booking request and will be in touch within 2 business days with availability and a quote.</p>
    <a href="/">Back to Bloom Bar</a>
  </div>
</body>
</html>
